version: 2
models:
  - name: attributes_batch
    description: "Batch pendiente más antiguo de ATTRIBUTES (todas las empresas)."
    tests:
      - no_stale_batch_vs_integ:
          integ_ref: attributes_integ
          pk_cols: ["CODE"]
  - name: attributes_integ
    description: "Tabla SCD2 integrada de ATTRIBUTES."
    tests:
      - scd2_single_current:
          pk_cols: ["CODE"]
      - scd2_no_overlap:
          pk_cols: ["CODE"]
      - no_nulls_except:
          exclude: []
    columns:
      - name: tec_cod_vigencia
        tests:
          - accepted_values:
              values: [0, 1]
